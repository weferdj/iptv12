<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a12">
<title>DSPORTS · Embed</title>
<meta name="robots" content="noindex">
<style>
:root{
  --bg:#0a0a12;--acc:#7c3aed;--acc-rgb:124,58,237;
  --s2:color-mix(in srgb,var(--bg) 20%,#1e1e30);
  --s3:color-mix(in srgb,var(--bg) 10%,#25253a);
  --border:rgba(255,255,255,.08);
  --text:#eeeef5;--muted:#7878a0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  height:100dvh; /* altura dinámica real en móviles */
  overflow:hidden;
  background:var(--bg);
}
body{
  color:var(--text);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  display:flex;
  flex-direction:column;
}
svg{display:block}
.icon-sm{width:12px;height:12px;flex-shrink:0}
.icon-xl{width:48px;height:48px;flex-shrink:0;margin:0 auto}

.player-wrap{
  flex:1;
  background:#000;
  position:relative;
  overflow:hidden;
}
.player-slot{
  position:absolute;
  inset:0;
}
/* Para todos los reproductores: forzar cobertura total sin márgenes */
.player-slot iframe,
.player-slot video,
.player-slot .jwplayer,
.player-slot > div {
  position:absolute !important;
  inset:0 !important;
  width:100% !important;
  height:100% !important;
  border:none;
  margin:0 !important;
  padding:0 !important;
}
.player-slot video {
  object-fit:contain;  /* cambia a cover si quieres recortar para llenar todo */
}
/* Capas internas de Bitmovin */
.player-slot .bmpui-ui-uicontainer,
.player-slot .bmpui-ui-playbacktogglelayer,
.player-slot .bmpui-ui-watermark,
.player-slot .bmpui-ui-bufferlayer,
.player-slot .bmpui-ui-subtitlelayer,
.player-slot .bmpui-ui-uiconfig,
.player-slot .bmpui-ui-container {
  position:absolute !important;
  inset:0 !important;
  width:100% !important;
  height:100% !important;
}
.player-error-msg{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  text-align:center;padding:1.5rem;color:var(--muted);font-size:.8rem;background:var(--s2);
}
.watermark{
  position:absolute;bottom:.7rem;left:.85rem;z-index:8;font-size:.7rem;
  color:rgba(255,255,255,.4);font-weight:600;pointer-events:none;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
}
.stream-bar{
  display:flex;gap:.4rem;flex-wrap:wrap;padding:.5rem .65rem;background:var(--s2);
  border-top:1px solid var(--border);flex-shrink:0;
}
.stream-btn{
  display:flex;align-items:center;gap:.35rem;background:var(--s3);
  border:1px solid rgba(255,255,255,.1);color:var(--muted);border-radius:7px;
  padding:.32rem .7rem;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .15s;
}
.stream-btn:hover{color:var(--text)}
.stream-btn.active{
  background:rgba(var(--acc-rgb),.16);border-color:rgba(var(--acc-rgb),.5);color:var(--acc);
}
/* Pantallas de bloqueo (no se usan aquí pero se mantienen) */
.fullscreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;background:var(--bg)}
.center-card{background:var(--s2);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:1.8rem 1.6rem;max-width:320px;width:100%;text-align:center}
.center-card .icon-xl{margin-bottom:.85rem;color:var(--acc)}
.center-card h2{font-size:1.05rem;font-weight:700;margin-bottom:.35rem}
.center-card p{color:var(--muted);font-size:.8rem;line-height:1.5;margin-bottom:1.2rem}
.form-field{width:100%;background:var(--s3);border:1px solid rgba(255,255,255,.1);border-radius:9px;color:var(--text);padding:.6rem .8rem;font-size:.85rem;margin-bottom:.6rem;font-family:inherit}
.form-field:focus{outline:none;border-color:rgba(var(--acc-rgb),.7)}
.err-txt{color:#f87171;font-size:.75rem;margin-bottom:.5rem}
.btn-main{width:100%;background:var(--acc);color:#fff;border:none;border-radius:9px;padding:.65rem;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit}
.btn-main:hover{filter:brightness(1.1)}
</style>
</head>
<body>

<div class="player-wrap">
  <div class="player-slot" data-stream-index="0">
    <div class="js-player-init"
         data-type="mpd"
         data-src="aHR0cHM6Ly9hYmxrbHJ6YWFhYWFhYWFtanA3c3p4ZGdmc2hnei50YS5iaWEtY2YubGl2ZS5wdi1jZG4ubmV0L2dydS1uaXRyby9saXZlL2NsaWVudHMvZGFzaC9lbmMvM2dnMmpuaXhqbi9vdXQvdjEvZTE4NDBlMDFmM2YxNDU2M2I2NmJiYjk0NGQ1Y2M1NGMvY2VuYy5tcGQ/YW16bkR0aWQ9QU9BR1pBMDE0TzVSRSZhbXpuUE49eHAmYW16blBWPUFUVldlYlBsYXllclNESy0xLjAuMjM4NTkwLjAmZW5jb2Rpbmc9c2VnbWVudEJhc2U="
         data-mpd-key="YWZhZDQ5ZDIwZWIzOTY3MGU5M2UzNzFjMWQ2Njk5MjE="
         data-mpd-id="ZjhiMjA3YzEwZjNmNzZhZWJhMzJhMzYwZWM1MmI5ZTQ="
         data-auto="1" data-muted="0" data-ctrl="1" data-loop="0">
    </div>
  </div>
  <div class="watermark">VIVILOMIX</div>
</div>

<script>
var CFG = {
  autoplay: true,
  muted:    false,
  controls: true,
  loop:     false,
  ll:       true,
  dvr:      0,
  logo:     "https://dl2-videx.page.gd/canal/1781407365_6a2e1e85ee656.png",
  jw_lib:   'https://cdn.jwplayer.com/libraries/IDzF9Zmk.js',
  apiBase:  'api.php',
  channel:  "chn_2aaccab77c7d",
  session:  "90aecaa3c9143915d848478b36340644"
};

function b64d(s) {
  if (!s) return '';
  try { return decodeURIComponent(escape(atob(s))); } catch (e) { return ''; }
}

document.querySelectorAll('.js-player-init').forEach(function(el) {
  var type   = el.dataset.type;
  var src    = b64d(el.dataset.src);
  var backup = b64d(el.dataset.backup);

  if (type === 'hls') {
    var vid = document.createElement('video');
    vid.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:contain';
    if (CFG.controls) vid.controls = true;
    if (CFG.muted)    vid.muted    = true;
    if (CFG.loop)     vid.loop     = true;
    if (CFG.autoplay) vid.autoplay = true;
    vid.playsInline = true;
    el.parentNode.replaceChild(vid, el);

    var tried = false;
    function loadHLS(s) {
      if (window.Hls && Hls.isSupported()) {
        var h = new Hls({lowLatencyMode: CFG.ll, backBufferLength: CFG.dvr});
        h.loadSource(s);
        h.attachMedia(vid);
        h.on(Hls.Events.ERROR, function(e,d) {
          if (d.fatal && !tried && backup) { tried=true; loadHLS(backup); }
        });
      } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
        vid.src = s;
      }
    }
    if (src) loadHLS(src);

    if (!window.Hls) {
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js';
      s.onload = function() { if (src) loadHLS(src); };
      document.head.appendChild(s);
    }
  } else if (type === 'mp4') {
    var vid = document.createElement('video');
    vid.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:contain';
    if (CFG.controls) vid.controls = true;
    if (CFG.muted)    vid.muted    = true;
    if (CFG.loop)     vid.loop     = true;
    if (CFG.autoplay) vid.autoplay = true;
    vid.playsInline = true;
    var src_el = document.createElement('source'); src_el.src = src; vid.appendChild(src_el);
    if (backup) { var s2=document.createElement('source'); s2.src=backup; vid.appendChild(s2); }
    el.parentNode.replaceChild(vid, el);
  } else if (type === 'jwplayer') {
    (function(jwSrc, jwBackup, jwEl) {
      window._jwSeq = (window._jwSeq || 0) + 1;
      var jwDiv = document.createElement('div');
      jwDiv.style.cssText = 'position:absolute;inset:0;width:100%;height:100%';
      jwDiv.id = 'jwp-' + window._jwSeq;
      jwEl.parentNode.replaceChild(jwDiv, jwEl);
      window._jwPending = window._jwPending || {};
      window._jwPending[jwDiv.id] = { src: jwSrc, backup: jwBackup, tried: false, initialized: false };

      function tryInitIfVisible() {
        var slot = jwDiv.closest('.player-slot');
        if (!slot || slot.style.display === 'none') return;
        var pending = window._jwPending[jwDiv.id];
        if (pending && !pending.initialized) initJwInstance(jwDiv.id, pending);
      }

      if (window.jwplayer) {
        tryInitIfVisible();
      } else if (!window._jwLoading) {
        window._jwLoading = true;
        var sc = document.createElement('script');
        sc.src = CFG.jw_lib;
        sc.onload = function() {
          window._jwLoading = false;
          window._jwLibReady = true;
          document.querySelectorAll('.player-slot').forEach(function(slot) {
            if (slot.style.display === 'none') return;
            slot.querySelectorAll('[id^="jwp-"]').forEach(function(d) {
              var pending = window._jwPending && window._jwPending[d.id];
              if (pending && !pending.initialized) initJwInstance(d.id, pending);
            });
          });
        };
        document.head.appendChild(sc);
      }
    }(src, backup, el));
  } else if (type === 'custom') {
    var wrap = document.createElement('div');
    wrap.style.cssText = 'position:absolute;inset:0;width:100%;height:100%';
    wrap.innerHTML = src;
    el.parentNode.replaceChild(wrap, el);
  } else if (type === 'mpd') {
    var mpdKey = b64d(el.dataset.mpdKey);
    var mpdId  = b64d(el.dataset.mpdId);
    window._bmSeq = (window._bmSeq || 0) + 1;
    var bmDiv = document.createElement('div');
    bmDiv.style.cssText = 'position:absolute;inset:0;width:100%;height:100%';
    bmDiv.id = 'bm-mpd-' + window._bmSeq;
    el.parentNode.replaceChild(bmDiv, el);

    function initBitmovin(divId) {
      var _bmXhrOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function() {
        var u = arguments[1];
        if (u && u.indexOf('licensing.bitmovin.com') > -1)
          u = 'data:text/plain;charset=utf-8;base64,eyJzdGF0dXMiOiJncmFudGVkIiwibWVzc2FnZSI6IlRoZXJlIHlvdSBnby4ifQ==';
        arguments[1] = u;
        return _bmXhrOpen.apply(this, arguments);
      };
      var bmCfg = {
        key: '448211ca-b270-4ce6-b9bd-7dc210fd245b',
        analytics: false,
        playback: {
          autoplay:  CFG.autoplay,
          muted:     CFG.muted,
          loop:      CFG.loop,
          preferredTech: [{ player: 'html5', streaming: 'dash' }]
        },
        style: { width: '100%', height: '100%' },
        ui: CFG.controls ? undefined : { enabled: false }
      };
      if (CFG.logo) bmCfg.watermarking = { position: 'top-right', url: CFG.logo };
      var bmSource = { dash: src };
      if (mpdKey && mpdId) {
        bmSource.drm = { clearkey: [{ keyId: mpdId, key: mpdKey }] };
      }
      var bmPlayer = new bitmovin.player.Player(document.getElementById(divId), bmCfg);
      bmPlayer.load(bmSource).catch(function(e){
        if (CFG.autoplay && !CFG.muted) {
          bmCfg.playback.muted = true;
          var p2 = new bitmovin.player.Player(document.getElementById(divId), bmCfg);
          p2.load(bmSource).catch(function(e2){ console.warn('Bitmovin embed error:', e2); });
        } else { console.warn('Bitmovin embed error:', e); }
      });
    }

    if (window.bitmovin && window.bitmovin.player) {
      initBitmovin(bmDiv.id);
    } else if (!window._bmLoading) {
      window._bmLoading = true;
      var sc = document.createElement('script');
      sc.src = '//cdn.bitmovin.com/player/web/8/bitmovinplayer.js';
      sc.onload = function() { window._bmLoading = false; initBitmovin(bmDiv.id); };
      document.head.appendChild(sc);
    } else {
      var iv = setInterval(function() {
        if (window.bitmovin && window.bitmovin.player) { clearInterval(iv); initBitmovin(bmDiv.id); }
      }, 150);
    }
  }
});

var currentStreamIndex = 0;

function switchStream(btn) {
  var target = String(btn.getAttribute('data-st'));
  if (target === String(currentStreamIndex)) return;

  document.querySelectorAll('.player-slot').forEach(function(slot) {
    var slotIndex = String(slot.getAttribute('data-stream-index'));
    var isActive  = slotIndex === target;

    if (isActive) {
      slot.style.display = '';
      slot.querySelectorAll('iframe').forEach(function(f) {
        if (f.dataset.pausedSrc) { f.src = f.dataset.pausedSrc; delete f.dataset.pausedSrc; }
      });
      slot.querySelectorAll('video').forEach(function(v) {
        try { v.play(); } catch(e) {}
      });
      slot.querySelectorAll('[id^="jwp-"]').forEach(function(d) {
        var pending = window._jwPending && window._jwPending[d.id];
        if (!pending) return;
        if (!pending.initialized && window._jwLibReady) {
          initJwInstance(d.id, pending);
        }
      });
    } else {
      slot.style.display = 'none';
      slot.querySelectorAll('iframe').forEach(function(f) {
        if (!f.dataset.pausedSrc) { f.dataset.pausedSrc = f.src; f.src = 'about:blank'; }
      });
      slot.querySelectorAll('video').forEach(function(v) { v.pause(); v.muted = true; });
      slot.querySelectorAll('[id^="jwp-"]').forEach(function(d) {
        var pending = window._jwPending && window._jwPending[d.id];
        if (pending && pending.initialized) {
          try { jwplayer(d.id).remove(); } catch(e) {}
          pending.initialized = false;
        }
      });
    }
  });

  currentStreamIndex = parseInt(target, 10);
  document.querySelectorAll('.stream-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
}

function initJwInstance(divId, pending) {
  pending.initialized = true;
  var cfg = { file: pending.src, width:'100%', height:'100%', autostart: true, mute: CFG.muted, controls: CFG.controls, repeat: CFG.loop, stretching:'uniform' };
  if (CFG.logo) cfg.logo = { file: CFG.logo, position:'top-right', hide:false };
  var jw = jwplayer(divId).setup(cfg);

  if (pending.backup) {
    function switchToBackup() {
      if (pending.tried) return;
      pending.tried = true;
      var cfg2 = { file: pending.backup, width:'100%', height:'100%', autostart: true, mute: CFG.muted, controls: CFG.controls, repeat: CFG.loop, stretching:'uniform' };
      if (CFG.logo) cfg2.logo = { file: CFG.logo, position:'top-right', hide:false };
      jwplayer(divId).setup(cfg2);
    }
    jw.on('setupError', switchToBackup);
    jw.on('error', switchToBackup);
  }
}

function pingChannel() {
  fetch(CFG.apiBase, {method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body: 'action=ping_channel&channel=' + encodeURIComponent(CFG.channel) + '&session_id=' + CFG.session
  }).catch(function(){});
}
pingChannel(); setInterval(pingChannel, 20000);
</script>
